<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB FORM </title>
    <link rel="icon" type="image/jpeg" href="company.jpeg"
</head>
<body>
  <style>
    body{
        background-color:beige
    }
    
  </style>

    <form>
        <center><h1 style="font-size:35px;">EMPLOYEE FORM</h1></center>
        <b><h2>PERSONAL DETAIL</h2></b>
        <label> FULL NAME:-</label>
        <input type="text" placeholder="ENTER YOUR NAME">
        <br>
        <br>
        <label>DATE OF BIRTH:-</label>
        <input type="date" placeholder="00/00/0000">
        <br>
        <br>
        <b><label>GENDER:-</label></b>
        <br>
        <input type="checkbox" name="GENDER" id="MALE">
        <label>MALE</label>
        <input type="checkbox" name="GENDER" id="FEMALE">
        <label>FEMALE</label>
        <input type="checkbox" name="GENDER" id="OTHERS">
        <label>OTHERS</label>
        <br>
        <br>
        <label>NATIONAL IDENTITY/AADHAR CARD:-</label>
        <input type="numbers" placeholder="0000 0000 0000">
        <br>
        <br>
        <b><label>MARITAL STATUS:-</label></b>
        <br>
        <input type="checkbox" name="MARITAL STATUS" id="MARRIED">
        <label>MARRIED</label>
        <input type="checkbox" name="MARITAL STATUS" id="UNMARRIED">
        <label>UNMARRIED</label>
        <br>
        <h3 style="font-size: 20px;">CONTACT DETAILS:-</h2>
        <label>MOBILE NUMBER:-</label>
        <input type="numbers" placeholder="0000000000">
        <br>
        <label>EMERGENY CONTACT NO:-</label>
        <input type="numbers" placeholder="0000000000">
        <br>
        <label>EMAIL ID:-</label>
        <input type="email" placeholder="123@gmail.com">
        <br>
       <h4 style="font-size: 20px;">EMPLOYEE INFORMATION:-</h4>
        <label>JOB TITLE:-</label>
        <input type="text" >
        <br>
        <br>
        <label>DEPARTMENT:-</label>
        <input type="text">
        <br>
        <br>
        <label>START DATE:-</label>
        <input type="text">
        <br>
        <br>
        <b><label>EMPLOYEMENT DETAILS:- </label></b>
        <br>
        <input type="checkbox" name="EMPLOYEMENT DETAILS" id="FULL-TIME">
        <label>FULL DATE</label>
        <input type="checkbox" name="EMPLOYEMENT DETAILS" id ="PART-TIME">
        <label>PART-TIME</label>
        <br>
        <br>
        <h5 style ="font-size:20px;">EDUCATON &EXPERIENCE:-</h5>
        <label>UPLOAD 10TH MARKSHEET</label>
        <input type="file" >
        <br>
        <label>UPLOAD 12TH MARKSHEET</label>
        <input type="file">
        <br>
        <label>GRADUATION CERTIFICATE</label>
        <input type="file">
        <br>
        <label>HIGHEST EDUATION</label>
        <input type="text" placehholder="HIGHEST EDUCATION DETAILS">
        <br>
        <label>PREVIOUS JOB</label>
        <input type="text">
        <br>
        <label> WORKING EXPERIENCE</label>
        <input type="numbers">
        <br>
        <br>
        <b><label>BANKING &PAYROLL:-</label></b>
        <br>
        <label>BANK ACCOUNT NAME:-</label>
        <input type="text">
        <br>
        <label>BANK ACCOUNT NO:-</label>
        <input type="numbers" >
        <br>
        <label>BRANCH NAME:-</label>
        <input type="text">
        <br>
        <br>
       <h6 style="font-size:20px;">DECLARATION:-</H6>
        <label>I confirm that the information provided is accurate and complete.</label>
        <br>
        <label>SIGNATURE</label>
        <br>
        <label>DATE:-</label>
        <input type="date">
        <br>
        <br>
       <center> <button style="background:blue;color:white;padding:20px;">SUBMIT</button></center>

    </form>
</body>
</html>

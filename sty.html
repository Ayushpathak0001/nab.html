<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Styled Page</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
    }

    .card {
      background: white;
      max-width: 400px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      line-height: 1.6;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #217dbb;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Hello World</h1>
    <p>This is a styled HTML card using CSS.</p>
    <button>Click Me</button>
  </div>

</body>
</html>

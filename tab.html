<!DOCTYPE html>
<html>
<head>
    <title>Simple HTML Table</title>
    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2 align="center">Student Information</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Grade</th>
    </tr>
    <tr>
        <td>John</td>
        <td>15</td>
        <td>A</td>
    </tr>
    <tr>
        <td>Mary</td>
        <td>14</td>
        <td>B</td>
    </tr>
    <tr>
        <td>Alex</td>
        <td>16</td>
        <td>A+</td>
    </tr>
</table>

</body>
</html>
